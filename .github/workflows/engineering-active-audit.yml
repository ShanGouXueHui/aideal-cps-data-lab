name: Active Engineering Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "run/**"
      - "scripts/**"
      - "config/**"
      - "tests/**"
      - "docs/DOCUMENT_AUTHORITY.md"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "run/**"
      - "scripts/**"
      - "config/**"
      - "tests/**"
      - "docs/DOCUMENT_AUTHORITY.md"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run active audit
        id: scan
        continue-on-error: true
        run: PYTHONPATH=src python scripts/engineering_scan_active.py
      - name: Upload active audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-engineering-active-audit
          path: reports/project_engineering_active_audit_latest.json
          if-no-files-found: error
      - name: Enforce blockers
        if: steps.scan.outcome != 'success'
        run: exit 1
