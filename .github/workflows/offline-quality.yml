name: Offline Quality

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "run/**"
      - "scripts/**"
      - "config/**"
      - "tests/**"
      - ".github/workflows/offline-quality.yml"
  pull_request:
    paths:
      - "src/**"
      - "run/**"
      - "scripts/**"
      - "config/**"
      - "tests/**"

permissions:
  contents: write

concurrency:
  group: offline-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-quality:
    runs-on: ubuntu-latest
    env:
      AIDEAL_OFFLINE_TEST: "1"
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install offline test dependencies
        id: dependencies
        continue-on-error: true
        run: python -m pip install -e ".[browser,mysql]"
      - name: Run offline commercialization quality gate
        id: quality
        continue-on-error: true
        env:
          AIDEAL_DEPENDENCY_INSTALL_OUTCOME: ${{ steps.dependencies.outcome }}
        run: python scripts/run_offline_quality.py
      - name: Upload offline quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-quality-report
          path: reports/offline_quality_latest.json
          if-no-files-found: error
      - name: Publish main branch quality report
        if: >-
          always() &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          hashFiles('reports/offline_quality_latest.json') != ''
        run: |
          cp reports/offline_quality_latest.json /tmp/offline_quality_latest.json
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p reports
          cp /tmp/offline_quality_latest.json reports/offline_quality_latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/offline_quality_latest.json
          if git diff --cached --quiet; then
            echo "OFFLINE_REPORT_UNCHANGED=1"
          else
            git commit -m "reports: update offline quality baseline"
            git push origin main
          fi
      - name: Enforce dependency installation
        if: steps.dependencies.outcome != 'success'
        run: exit 1
      - name: Enforce offline quality result
        if: steps.quality.outcome != 'success'
        run: exit 1
