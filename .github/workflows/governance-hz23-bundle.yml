name: Governance HZ23 Bundle

on:
  push:
    branches:
      - codex/governance-continuation
  workflow_dispatch:

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/governance-continuation
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare exact patch baseline
        run: |
          git checkout bc61e62296f1121f65359b037cc476b804b5a46a -- \
            src/aideal_cps_data_lab/engineering_audit/service.py \
            tests/test_engineering_audit_duplicates.py

      - name: Apply verified refactor
        run: python scripts/ops/apply_hz23_default_source_refactor.py

      - name: Run offline checks
        env:
          PYTHONPATH: src
          AIDEAL_OFFLINE_TEST: "1"
        run: |
          python -m unittest tests.test_engineering_audit_duplicates
          bash -n config/hz23-service.env
          bash -n scripts/hz23_mainline_refresh.sh
          bash -n scripts/hz23_observation_daemon.sh
          bash -n scripts/hz23_safe_reload_observer.sh
          bash -n scripts/hz23_resume_nohup_conservative.sh
          git diff --check

      - name: Commit verified files
        run: |
          rm -f scripts/ops/apply_hz23_default_source_refactor.py
          rm -f scripts/ops/publish_terminal_repair_evidence.py
          rm -f .github/workflows/governance-hz23-bundle.yml
          rm -f docs/debug/pr-continuation-note.tmp
          rm -f docs/debug/pr-continuation-note-2.tmp
          rm -f docs/debug/stop.tmp
          rm -f docs/debug/ignore.tmp
          rm -f docs/debug/governance-branch-note.tmp
          rm -f docs/debug/connector-stage.tmp
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: centralize HZ23 defaults"
          git push origin HEAD:codex/governance-continuation
